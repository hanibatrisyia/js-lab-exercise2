<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Kanban Task Board</title>
</head>
<body>
	<!-- Create a <header> with an app title and a
	task counter badge (updated by JS) -->
	<header>
		<div class="header-left">
			<h1>My Task Board</h1>
			<span id="task-count" class="badge">0 tasks</span>
		</div>
		<!-- Add a priority filter <select> dropdown in the header -->
		<div class="header-right">
			<label for="priority-filter">Filters:</label>
			<select id="priority-filter">
				<option value="all">All Priorities</option>
				<option value="high">High Priorities</option>
				<option value="medium">Medium Priorities</option>
				<option value="low">Low Priorities</option>
			</select>
		</div>
	</header>

	<!-- Create three columns using <section id="todo">, 
	<section id="inprogress">, <section id="done"> -->
	<main class="board">
		<!-- Each column needs: a heading, a task list 
		(<ul>), and an "Add Task" button -->

		<section id="todo" class="column">
			<div class="column=header">
				<h2>To Do</h2>
				<button class="btn-add" data-column="todo">+ Add Task</button>
			</div>
			<ul class="task-list" id="list-todo"></ul>
		</section>

		<section id="inprogress" class="column">
			<div class="column-header">
				<h2>In Progress</h2>
				<button class="btn-add" data-column="inprogress">+ Add Task</button>
			</div>
			<ul class="task-list" id="list-inprogress"></ul>
		</section>

		<section id="done" class="column">
			<div class="column-header">
				<h2>Done</h2>
				<button class="btn-add" data-column="done">+ Add Task</button>
			</div>
			<button class="btn-clr-done" id="clear-done">Clear All</button>
			<ul class="task-list" id="list-done"></ul>
		</section>
	</main>
</body>
</html>
