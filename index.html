<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Kanban Task Board</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<!-- Create a <header> with an app title and a
	task counter badge (updated by JS) -->
	<header>
		<div class="header-left">
			<h1>My Task Board</h1>
			<span id="task-count" class="badge">0 tasks</span>
		</div>
		<!-- Add a priority filter <select> dropdown in the header -->
		<div class="header-right">
			<label for="priority-filter">Filters:</label>
			<select id="priority-filter">
				<option value="all">All Priorities</option>
				<option value="high">High Priorities</option>
				<option value="medium">Medium Priorities</option>
				<option value="low">Low Priorities</option>
			</select>
		</div>
	</header>

	<!-- Create three columns using <section id="todo">, 
	<section id="inprogress">, <section id="done"> -->
	<main class="board">
		<!-- Each column needs: a heading, a task list 
		(<ul>), and an "Add Task" button -->

		<section id="todo" class="column">
			<div class="column-header">
				<h2>To Do</h2>
				<button class="btn-add" data-column="todo">+ Add Task</button>
			</div>
			<ul class="task-list" id="list-todo"></ul>
		</section>

		<section id="inprogress" class="column">
			<div class="column-header">
				<h2>In Progress</h2>
				<button class="btn-add" data-column="inprogress">+ Add Task</button>
			</div>
			<ul class="task-list" id="list-inprogress"></ul>
		</section>

		<section id="done" class="column">
			<div class="column-header">
				<h2>Done</h2>
				<button class="btn-add" data-column="done">+ Add Task</button>
			</div>
			<button class="btn-clr-done" id="clear-done">Clear All</button>
			<ul class="task-list" id="list-done"></ul>
		</section>
	</main>

	<!-- Create a modal <div> (hidden by default) with: title input, description textarea, 
	priority <select>, due date picker, Save and Cancel buttons -->
	<div id="modal-overlay" class="modal-overlay">
		<div class="modal">
			<h2 id="modal-title">Add Task</h2>

			<div class="form-group">
				<label for="input-title">Title</label>
				<input type="text" id="input-title" placeholder="Task title" />
			</div>

			<div class="form-group">
				<label for="input-desc">Description</label>
				<textarea id="input-desc" rows="3" placeholder="Optional description"></textarea>
			</div>

			<div class="form-row">
				<div class="form-group">
					<label for="input-priority">Priority</label>
					<select id="input-priority">
						<option value="low">Low</option>
						<option value="medium">Medium</option>
						<option value="high">High</option>
					</select>
				</div>

				<div class="form-group">
					<label for="input-due">Due date</label>
					<input type="date" id="inpur-due" />
				</div>
			</div>

			<div class="modal-actions">
				<button id="btn-save" data-mode="add">Save</button>
				<button id="btn-cancel">Cancel</button>
			</div>
		</div>
	</div>
	<script src="taskmanager.js"></script>
</body>
</html>
